server {
    listen 443 ssl;
    server_name ss.chakshu.co.in;

    ssl_certificate /etc/letsencrypt/live/ss.chakshu.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ss.chakshu.co.in/privkey.pem;

    # MCP server (Streamable HTTP)
    location /mcp {
        proxy_pass http://127.0.0.1:3004/mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # React Admin + API
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Direct public access to MinIO screenshots
    location /s3/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50m;
    }
}

server {
    listen 80;
    server_name ss.chakshu.co.in;
    return 301 https://$host$request_uri;
}
